# ===========================================================================
# prh 辞書（表記揺れ補正）
# ---------------------------------------------------------------------------
# 書き方:
#   - expected: <正しい表記>
#     pattern:  <誤表記>          # 単純な文字列
#     # または
#     patterns: [<誤1>, <誤2>]    # 複数指定
#     # または
#     pattern: /<正規表現>/       # 正規表現（/ で囲む）
#     specs:                      # テスト（spec 不一致だと prh.yml のロードが失敗する）
#       - from: <誤表記>
#         to:   <正しい表記>
#
# 辞書を分割したい場合:
#   imports:
#     - terms.yml
# ===========================================================================
version: 1
rules:
  # 例: 漢字混り表記の統一
  - expected: 漏えい
    patterns:
      - 漏洩
    specs:
      - from: 漏洩
        to:   漏えい

  # 例: カタカナ長音の統一
  - expected: ユーザー
    pattern: /ユーザ(?!ー)/
    specs:
      - from: ユーザ
        to:   ユーザー
